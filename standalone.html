<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MOMAH · Dynamic Subsidy Allocation & Optimization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B8354; --green-dark:#085D3A; --green-700:#12724a; --green-50:#ECFDF3; --green-100:#cdeede;
  --gold:#F8C630; --gold-50:#fef7e0; --teal-deep:#0b3b34;
  --bg:#f4f7f5; --card:#ffffff; --ink:#16211c; --muted:#5c6b63; --line:#e2eae5;
  --danger:#e32700; --danger-50:#fdeae6; --amber:#e29700; --amber-50:#fcf3dd; --success:#73b355; --info:#1763a6; --info-50:#e7f0f9;
  --radius:12px; --radius-sm:8px; --shadow:0 1px 2px rgba(16,33,28,.06),0 4px 16px rgba(16,33,28,.06);
  --sidebar-w:248px; --topbar-h:60px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:Arial,Helvetica,"Noto Naskh Arabic",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg); color:var(--ink); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
html[dir="rtl"] body{font-family:"Noto Naskh Arabic","Droid Arabic Naskh",Arial,Helvetica,sans-serif}
#root{height:100%}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
h1,h2,h3,h4{margin:0;font-weight:600;color:var(--ink)}
.muted{color:var(--muted)}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;border-radius:var(--radius-sm);
  padding:9px 16px;font-size:14px;font-weight:600;background:var(--green);color:#fff;transition:.15s}
.btn:hover{background:var(--green-dark)}
.btn.secondary{background:#fff;color:var(--green);border-color:var(--green-100)}
.btn.secondary:hover{background:var(--green-50)}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{background:#f0f4f1}
.btn.danger{background:#fff;color:var(--danger);border-color:var(--danger-50)}
.btn.danger:hover{background:var(--danger-50)}
.btn.sm{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- chips / badges ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--green-50);color:var(--green-dark)}
.chip.gold{background:var(--gold-50);color:var(--gold)}
.chip.amber{background:var(--amber-50);color:var(--amber)}
.chip.danger{background:var(--danger-50);color:var(--danger)}
.chip.info{background:var(--info-50);color:var(--info)}
.chip.gray{background:#eef2ef;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.badge-count{background:var(--danger);color:#fff;border-radius:999px;min-width:18px;height:18px;padding:0 5px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.kpi .label{font-size:12.5px;color:var(--muted);font-weight:600;letter-spacing:.01em}
.kpi .value{font-size:26px;font-weight:700;margin-top:6px;line-height:1.1}
.kpi .sub{font-size:12px;margin-top:6px}
.grid{display:grid;gap:16px}

/* ---------- topbar ---------- */
.topbar{height:var(--topbar-h);background:var(--green);color:#fff;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:40}
.topbar .brand{display:flex;align-items:center;gap:12px;font-weight:700}
.topbar .brand .logo{width:34px;height:34px;border-radius:8px;background:#fff;color:var(--green);
  display:grid;place-items:center;font-weight:800;font-size:15px}
.topbar .right{display:flex;align-items:center;gap:8px}
.topbar .tbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;
  border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;font-weight:600;display:inline-flex;gap:6px;align-items:center}
.topbar .tbtn:hover{background:rgba(255,255,255,.22)}
.usermenu{position:relative}
.usermenu .panel{position:absolute;top:46px;inset-inline-end:0;background:#fff;color:var(--ink);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);min-width:220px;padding:10px;z-index:50}

/* ---------- layout ---------- */
.shell{display:flex;min-height:calc(100% - var(--topbar-h))}
.sidebar{width:var(--sidebar-w);background:#fff;border-inline-end:1px solid var(--line);padding:16px 12px;flex:0 0 auto}
.sidebar .role{padding:10px 12px;border-radius:var(--radius-sm);background:var(--green-50);margin-bottom:14px}
.sidebar .role .nm{font-weight:700;color:var(--green-dark)}
.sidebar .role .rl{font-size:12px;color:var(--muted)}
.navitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);
  color:var(--ink);font-weight:500;margin-bottom:2px;border:1px solid transparent}
.navitem:hover{background:#f0f4f1}
.navitem.active{background:var(--green-50);color:var(--green-dark);font-weight:600;border-color:var(--green-100)}
.navitem .ico{width:18px;text-align:center}
.content{flex:1 1 auto;padding:24px 28px;min-width:0}
.page-h{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.page-h h1{font-size:22px}
.page-h .sub{color:var(--muted);margin-top:4px;font-size:13.5px;max-width:760px}

/* ---------- tables ---------- */
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th,table.tbl td{padding:10px 12px;text-align:start;border-bottom:1px solid var(--line)}
table.tbl thead th{background:#f3f7f4;color:var(--muted);font-weight:600;font-size:12px;white-space:nowrap}
table.tbl tbody tr:hover{background:#f8fbf9}
.expand-row td{background:#f8fbf9;border-bottom:1px solid var(--line)}

/* ---------- misc ---------- */
.progress{height:8px;border-radius:999px;background:#eef2ef;overflow:hidden}
.progress>span{display:block;height:100%;background:var(--green);border-radius:999px;transition:width .55s ease}
.range{width:100%;accent-color:var(--green)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600}
.input{border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;width:100%;background:#fff}
.input:focus{outline:2px solid var(--green-100);border-color:var(--green)}
.divider{height:1px;background:var(--line);margin:16px 0}
.banner{background:var(--gold-50);border:1px solid #ecdcae;color:#6b5210;border-radius:var(--radius-sm);padding:8px 14px;font-size:12.5px;display:flex;gap:8px;align-items:center}
.chain{display:flex;flex-direction:column;gap:8px}
.chain .node{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fafcfb;transition:.25s}
.chain .node.run{border-color:var(--info);background:var(--info-50)}
.chain .node.done{border-color:var(--green-100);background:var(--green-50)}
.chain .node .st{font-size:12px;font-weight:700}
.timeline{position:relative;padding-inline-start:18px}
.timeline .ev{position:relative;padding:0 0 16px 0}
.timeline .ev::before{content:"";position:absolute;inset-inline-start:-18px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--green)}
.timeline .ev::after{content:"";position:absolute;inset-inline-start:-13.5px;top:14px;bottom:-2px;width:1px;background:var(--line)}
.timeline .ev:last-child::after{display:none}
.tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:#eef2ef;color:var(--muted)}
.login-wrap{min-height:100%;display:grid;place-items:center;background:
  radial-gradient(1200px 500px at 80% -10%, var(--green-50), transparent),
  radial-gradient(900px 500px at -10% 110%, var(--gold-50), transparent), var(--bg);padding:24px}
.login-card{width:420px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px}
.role-pick{display:flex;flex-direction:column;gap:10px;margin:8px 0 4px}
.role-opt{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;text-align:start;background:#fff;width:100%}
.role-opt:hover{border-color:var(--green);background:var(--green-50)}
.role-opt.sel{border-color:var(--green);background:var(--green-50);box-shadow:0 0 0 2px var(--green-100)}
.role-opt .av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:700;background:var(--green-100);color:var(--green-dark);flex:0 0 auto}
.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cols-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr}}
@media(max-width:820px){.cols-2{grid-template-columns:1fr}.sidebar{display:none}}
.right-num{text-align:end}
.scrollx{overflow-x:auto}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---- Balady-style polish: icons, buttons, card accent, active nav ---- */
.ic-svg{width:16px;height:16px;display:inline-block;vertical-align:-3px;flex:0 0 auto}
[dir="rtl"] .ic-arrow{transform:scaleX(-1)}
.btn .ic-svg{width:15px;height:15px;vertical-align:-2px}
.tbtn .ic-svg{width:15px;height:15px}
.bld-lang2 .ic-svg{width:15px;height:15px;color:inherit}
/* content cards get a thin green top accent (Balady service-card style) */
.card.acc{border-top:3px solid var(--green);border-top-left-radius:var(--radius);border-top-right-radius:var(--radius)}
/* active sidebar item: green leading bar */
.navitem{position:relative}
.navitem.active::before{content:"";position:absolute;inset-inline-start:0;top:7px;bottom:7px;width:3px;background:var(--green);border-radius:0 2px 2px 0}
[dir="rtl"] .navitem.active::before{border-radius:2px 0 0 2px}
/* secondary buttons: white / green outline with inner icon (Balady "Details") */
.btn.secondary{display:inline-flex;align-items:center;gap:6px}
.btn.sm{display:inline-flex;align-items:center;gap:6px}

/* ---- Balady-style service cards ---- */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:1100px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.svc-grid{grid-template-columns:1fr}}
.svc-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);transition:transform .16s,box-shadow .16s,border-color .16s}
.svc-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(16,33,28,.12);border-color:var(--green-100)}
.svc-ic{width:46px;height:46px;border-radius:12px;background:var(--green-50);color:var(--green-dark);display:grid;place-items:center;font-size:22px;margin-bottom:4px}
.svc-title{font-weight:700;font-size:15px}
.svc-cat{font-size:12px;color:var(--muted)}
.svc-tags{list-style:none;margin:6px 0 12px;padding:0;display:flex;flex-direction:column;gap:5px}
.svc-tags li{font-size:12.5px;color:#3a4a42;position:relative;padding-inline-start:18px}
.svc-tags li::before{content:"\2713";position:absolute;inset-inline-start:0;color:var(--green);font-weight:800}
.svc-actions{margin-top:auto;display:flex;gap:8px;padding-top:4px}
.svc-actions .btn{flex:1;justify-content:center}

/* ---- Data Readiness: refresh flash ---- */
.flash-sources .card{animation:srcflash 1.3s ease}
@keyframes srcflash{0%{background:#eafaf0;box-shadow:0 0 0 0 rgba(27,131,84,0)}22%{box-shadow:0 0 0 3px rgba(27,131,84,.22)}100%{background:#fff;box-shadow:var(--shadow)}}

/* ---- What-if: AI orchestration animation ---- */
.ai-scan{height:3px;border-radius:2px;background:var(--green-50);overflow:hidden;position:relative;margin-bottom:8px}
.ai-scan span{position:absolute;top:0;bottom:0;left:0;width:38%;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:aiscan 1s linear infinite}
@keyframes aiscan{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}
.ai-working{font-size:12.5px;color:var(--green-dark);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;animation:aipulse 1.2s ease infinite}
@keyframes aipulse{0%,100%{opacity:.55}50%{opacity:1}}
.chain .node.run{animation:nodeglow 1s ease infinite}
@keyframes nodeglow{0%,100%{box-shadow:0 0 0 0 rgba(23,99,166,0)}50%{box-shadow:0 0 0 4px rgba(23,99,166,.16)}}
.flash-kpis .kpi{animation:kpiflash 1s ease}
@keyframes kpiflash{0%{box-shadow:0 0 0 0 rgba(27,131,84,0)}20%{box-shadow:0 0 0 3px rgba(27,131,84,.28)}100%{box-shadow:var(--shadow)}}
.flash-kpis .kpi .value{animation:kpipop .55s ease}
@keyframes kpipop{0%{transform:scale(1)}45%{transform:scale(1.07)}100%{transform:scale(1)}}

/* ---- added: data-readiness key/value, to-do rows, prominent alert, work-order, package detail ---- */
.kv{display:flex;flex-direction:column;gap:5px;font-size:12.5px}
.kv-row{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.av.sm{width:30px;height:30px;font-size:14px}
.todo-row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.todo-row:last-child{border-bottom:none}
.alert-strong{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:14px 18px;border-radius:12px;
  background:linear-gradient(0deg,var(--danger-50),var(--danger-50));border:1px solid #f0b4ad;border-inline-start:6px solid var(--danger);
  box-shadow:0 2px 10px rgba(179,38,30,.12)}
.alert-ico{font-size:26px;line-height:1}
.alert-title{font-weight:700;color:var(--danger);font-size:15px}
.alert-body{font-size:13px;color:#7a241d;margin-top:2px}
.alert-pill{background:var(--danger);color:#fff;font-weight:700;font-size:11px;padding:4px 12px;border-radius:999px;letter-spacing:.04em}
.wo{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;font-size:12px;background:#eef2ef;color:var(--ink);padding:2px 8px;border-radius:6px}
.wo-btn{cursor:pointer;border:1px solid transparent}
.wo-btn:hover{background:var(--green-100);color:var(--green-dark);border-color:var(--green)}
.modal-ov{position:fixed;inset:0;background:rgba(16,33,28,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.32);width:540px;max-width:100%;max-height:86vh;overflow:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0;z-index:1}
.modal-head h3{font-size:16px;font-weight:700}
.modal-x{background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer;width:30px;height:30px;border-radius:8px;line-height:1}
.modal-x:hover{background:#f0f4f1;color:var(--ink)}
.modal-body{padding:20px}
.pkg-detail{margin-top:12px;padding:12px 14px;background:#f8fbf9;border:1px solid var(--line);border-radius:10px}
.mini-kpi{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.mini-kpi .v{font-weight:700;font-size:16px;margin-top:2px}

/* ---- Balady SSO login (matched to reference layout) ---- */
.bld-login{position:relative;height:100%;min-height:100%;overflow:hidden;color:#161616}
.bld-bg{position:absolute;inset:0;z-index:0}
.bld-bg svg{width:100%;height:100%;display:block}
.bld-photo{position:absolute;inset:0;z-index:0;background:url('public/assets/building.jpg') center/cover no-repeat}
.bld-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(10,50,55,.50) 0%,rgba(10,50,55,.30) 50%,rgba(8,40,45,.62) 100%)}
.bld-logo-img{height:54px;width:auto;display:block;flex:0 0 auto}
.bld-logo-cap{color:#fff;font-weight:700;font-size:22px;line-height:1.3;max-width:360px}
.bld-center{position:relative;z-index:3;height:100%;display:flex;align-items:center;justify-content:center;padding:24px 15px}
.bld-wrap{width:100%;max-width:1200px}
.bld-row2{display:flex;align-items:center;justify-content:space-between;gap:2rem}
.bld-brand-area{flex:0 0 55%;max-width:55%;color:#fff}
.bld-logo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.bld-logo .circle{width:60px;height:60px;border-radius:50%;background:var(--green);border:2px solid #fff;display:grid;place-items:center;color:#fff;font-size:26px;font-weight:800;flex:0 0 auto}
.bld-logo .ar{display:block;font-weight:600;font-size:14px;line-height:1.3}
.bld-logo .en{opacity:.85;font-size:11px}
.bld-brand-area h3{font-size:46px;font-weight:700;line-height:1.25;letter-spacing:-1px;margin:0 0 16px}
.bld-brand-area p{font-size:18px;line-height:1.6;margin:0;max-width:480px;opacity:.95}
.bld-card-col{flex:0 0 45%;max-width:45%;display:flex;justify-content:center}
.bld-card{width:100%;max-width:526px;background:#fff;border-radius:16px;box-shadow:0 3px 22px rgba(0,0,0,.25);padding:40px 36px}
.bld-card h2{font-size:22px;font-weight:700;text-align:center;margin:0 0 28px}
.bld-fg{margin-bottom:18px;text-align:start}
.bld-fg label{display:block;font-size:14px;color:#161616;margin-bottom:6px}
.bld-inp{position:relative}
.bld-inp .ic{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);font-size:15px;color:#707070;pointer-events:none}
.bld-inp .eye{position:absolute;inset-inline-end:12px;top:50%;transform:translateY(-50%);font-size:15px;color:#707070;cursor:pointer;user-select:none}
.bld-inp input,.bld-inp select{width:100%;height:40px;border:1px solid #9DA4AE;border-radius:4px;background:#fff;padding:0 12px;padding-inline-start:38px;font-size:14px;color:#161616;font-family:inherit;outline:none;transition:border-color .15s}
.bld-inp.has-eye input{padding-inline-end:38px}
.bld-inp select{appearance:none;-webkit-appearance:none;padding-inline-end:34px;cursor:pointer}
.bld-inp input:focus,.bld-inp select:focus{border-color:#9DA4AE;border-bottom:2px solid #161616}
.bld-inp .caret{position:absolute;inset-inline-end:12px;top:50%;transform:translateY(-50%);color:#707070;pointer-events:none;font-size:11px}
.bld-hint{font-size:12px;color:#707070;margin:-10px 0 14px}
.bld-captcha{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.bld-code{background:#e5e7eb;border-radius:4px;min-width:120px;height:40px;display:flex;align-items:center;justify-content:center}
.bld-code span{font-family:"Courier New",monospace;font-size:18px;letter-spacing:4px;color:#161616;font-weight:600;user-select:none}
.bld-refresh{color:var(--green);font-size:18px;cursor:pointer;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:none;border:none}
.bld-captcha input{flex:1;height:40px;border:1px solid #9DA4AE;border-radius:4px;background:#fff;padding:0 12px;font-size:14px;text-align:center;letter-spacing:3px;font-family:"Courier New",monospace;outline:none}
.bld-captcha input:focus{border-bottom:2px solid #161616}
.bld-btn{width:100%;height:40px;border:none;border-radius:4px;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.bld-btn:hover{background:#146B43}
.bld-or{display:flex;align-items:center;gap:12px;color:#707070;font-size:13px;margin:18px 0}
.bld-or::before,.bld-or::after{content:"";flex:1;height:1px;background:#d1d5db}
.bld-nic{width:100%;max-width:404px;height:72px;border:1px solid #384250;border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;gap:14px;cursor:pointer;margin:0 auto 16px}
.bld-nic:hover{background:#f9fafb}
.bld-nic-grid{display:grid;grid-template-columns:repeat(3,10px);grid-template-rows:repeat(3,10px);gap:2px}
.bld-nic-grid i{width:10px;height:10px;border-radius:1px;display:block}
.bld-nic-grid .g{background:var(--green)}.bld-nic-grid .k{background:#1a1a1a}.bld-nic-grid .o{background:#e07c3e}

/* =========================================================================
   DATA LAYER  — all figures anchored to BRD V0.5.1 and internally consistent.
   See README.md for the rigor notes / sources.
   ========================================================================= */
const BRD = {
  eligibleFamilies: 1400000,          // >1.4M families passed eligibility
  baseline: { contracts:127952, spendSAR:18098000000, avgPerContract:141444 }, // 2024–2025/07
  phase3BudgetSAR: 7900000000,        // ~7.9B over 5y
  phase3Years: 5,
  targetContractsTotal: 510000,       // 2026–2030
  targetBreakdown: { redf:310000, zatca:150000, devHousing:50000 },
  hbrBaseline: 0.405,                 // 40–41%
  hbrTarget2030: 0.325,               // 30–35%
  ownershipNow: 0.6624, ownershipTarget: 0.70,
  fairnessThreshold: 1.0,
};
const ANNUAL_CONTRACTS = Math.round(BRD.targetContractsTotal / BRD.phase3Years); // 102000

// Income bands. NOTE: this engine works in the PHASE-3 FLEXIBLE-BUDGET frame
// (7.9B / 510k contracts ⇒ avg support ≈ 15.5k/contract). The historical 141,444/contract
// (18.098B / 127,952) is a *different basis* (total support incl. package/loan) and is shown
// only as a historical context card — never mixed into the optimization math.
// Calibration targets: ~64% of contracts to >10k · weighted avg support ≈ 17.4k · FG_base ≈ 0.70 · HBR_base ≈ 0.405.
// Above-10k bands are deliberately OVER-subsidised (BRD pain point: budget diverted to the less needy),
// so rationalising/reallocating them yields genuine savings.
// Two support instruments per BRD (kept as separate, documented sub-models):
//   subsidyBase – the FLEXIBLE-budget line (drives spend / savings / fairness), avg ≈ 17.4k
//   pkgBase     – the PACKAGE / effective buy-down support (drives HBR), avg ≈ 130k
// >10k bands are over-served on both instruments (BRD pain point).
const BANDS = [
  { id:"b1", key:"lt5",    below:true,  incomeAvg:4200,  popShare:0.15, cShareBase:0.08, subsidyBase:15000, pkgBase:95000,  homePrice:470000 },
  { id:"b2", key:"5to8",   below:true,  incomeAvg:6600,  popShare:0.20, cShareBase:0.14, subsidyBase:15800, pkgBase:105000, homePrice:560000 },
  { id:"b3", key:"8to10",  below:true,  incomeAvg:9000,  popShare:0.18, cShareBase:0.14, subsidyBase:16500, pkgBase:115000, homePrice:650000 },
  { id:"b4", key:"10to13", below:false, incomeAvg:11500, popShare:0.20, cShareBase:0.26, subsidyBase:18800, pkgBase:150000, homePrice:790000 },
  { id:"b5", key:"13to16", below:false, incomeAvg:14500, popShare:0.15, cShareBase:0.22, subsidyBase:20500, pkgBase:160000, homePrice:930000 },
  { id:"b6", key:"gt16",   below:false, incomeAvg:18500, popShare:0.12, cShareBase:0.16, subsidyBase:22500, pkgBase:170000, homePrice:1180000 },
];
// HBR (mortgage-burden) model: monthly payment on (price − downpayment − package buy-down) / income.
const MORT = { rate:0.073/12, n:300, down:0.10 };   // 7.3% APR, 25y, 10% down (calibrated to HBR_base≈40.5%)
const HBR_LEV = { boost:2.5, cap:0.6 };             // leverage of boost/cap on package support
function monthlyPayment(P){ const r=MORT.rate,n=MORT.n; return P<=0?0:P*r/(1-Math.pow(1+r,-n)); }

// 13 administrative regions of Saudi Arabia (eligible-base weights sum to 1; FG varies by region).
const REGIONS = [
  { key:"riyadh",   w:0.255, priceIdx:1.18, fg:0.74 },
  { key:"makkah",   w:0.210, priceIdx:1.22, fg:0.69 },

/* =========================================================================
   WHAT-IF / FORMULA ENGINE
   params:
     reallocatePct  – fraction of >10k contract share shifted to <10k bands (0..0.30)
     capHighPct     – reduction applied to subsidy of top two bands (0..0.20)
     boostLowPct    – uplift applied to subsidy of <10k bands (0..0.20)
   ========================================================================= */
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}

function computeAllocation(params){
  const p = Object.assign({ reallocatePct:0, capHighPct:0, boostLowPct:0, offPlanPct:0 }, params||{});
  const belowIdx = BANDS.map((b,i)=>b.below?i:-1).filter(i=>i>=0);
  const aboveIdx = BANDS.map((b,i)=>!b.below?i:-1).filter(i=>i>=0);

  // Total annual contracts kept constant (the 510k/5y target is non-negotiable).
  // reallocatePct shifts that fraction of the >10k contract share down to <10k bands, pro-rata.
  const baseAboveTotal = aboveIdx.reduce((s,i)=>s+BANDS[i].cShareBase,0);
  const moved = baseAboveTotal * p.reallocatePct;
  const belowBaseTotal = belowIdx.reduce((s,i)=>s+BANDS[i].cShareBase,0);

  const rows = BANDS.map((b)=>{
    let cShare = b.cShareBase;
    if(b.below)  cShare = b.cShareBase + moved*(b.cShareBase/belowBaseTotal);
    else         cShare = b.cShareBase*(1 - p.reallocatePct);
    let subsidy = b.subsidyBase;
    if(b.below) subsidy = b.subsidyBase*(1+p.boostLowPct);
    else        subsidy = subsidy*(1-p.capHighPct);          // cap applies to all >10k bands
    subsidy = subsidy*(1 - p.offPlanPct);                    // off-plan / in-kind restriction (flat — savings lever, FG/HBR neutral)
    return Object.assign({}, b, { cShare, subsidy });
  });

  const contractsTotal = ANNUAL_CONTRACTS;
  let spend=0, subsidyBelow=0, subsidyTotal=0;
  let hbrNum=0, hbrDen=0;
  rows.forEach(r=>{
    const contracts = contractsTotal*r.cShare;
    const bandSpend = contracts*r.subsidy;
    spend += bandSpend; subsidyTotal += bandSpend;
    if(r.below) subsidyBelow += bandSpend;
    r.contracts = contracts; r.bandSpend = bandSpend;
    // HBR: package buy-down reduces mortgage principal → lowers monthly payment → lowers burden.
    let pkg = r.pkgBase;
    if(r.below) pkg = r.pkgBase*(1 + p.boostLowPct*HBR_LEV.boost);
    else        pkg = r.pkgBase*(1 - p.capHighPct*HBR_LEV.cap);
    const principal = r.homePrice*(1-MORT.down) - pkg;
    const hbr = clamp(monthlyPayment(principal)/r.incomeAvg, 0.08, 0.70);
    r.hbr = hbr; r.pkg = pkg;
    hbrNum += hbr*r.popShare; hbrDen += r.popShare;
  });
  const avgPerContract = spend/contractsTotal;
  const popBelow = belowIdx.reduce((s,i)=>s+BANDS[i].popShare,0);
  const popTotal = BANDS.reduce((s,b)=>s+b.popShare,0);
  const FG = (subsidyBelow/subsidyTotal) / (popBelow/popTotal);
  const HBR = hbrNum/hbrDen;

  return { rows, spend, avgPerContract, FG, HBR, subsidyBelow, subsidyTotal, contractsTotal,
           fgShareBelow:subsidyBelow/subsidyTotal, popShareBelow:popBelow/popTotal };
}

const BASELINE = computeAllocation({}); // current matrix (all sliders = 0)

// Savings are measured against the current matrix (BASELINE). BRD frames savings as
// 1.37–3.4B over the 5-year phase (≈17–43% of the 7.9B budget).
function scenarioSavings(scn){
  const annual = BASELINE.spend - scn.spend;
  return { annual, phase: annual*BRD.phase3Years,
           pctOfBudget: (annual*BRD.phase3Years)/BRD.phase3BudgetSAR };
}

function fgByRegion(globalFG){
  // scale each region's baseline FG by the same ratio the global FG moved
  const ratio = globalFG / BASELINE.FG;
  return REGIONS.map(r=>({ key:r.key, fg:+(r.fg*ratio).toFixed(3), w:r.w, priceIdx:r.priceIdx }));
}

/* =========================================================================
   FORECAST (12-month spend projection with budget ceiling + alert)
   ========================================================================= */
function buildForecast(scn){
  const annualCeiling = BRD.phase3BudgetSAR / BRD.phase3Years; // 1.58B
  const monthlyCeiling = annualCeiling/12;
  const monthlyAvg = scn.spend/12;
  const months=[];
  let cum=0;
  for(let m=1;m<=12;m++){
    const seasonal = 1 + 0.12*Math.sin((m/12)*Math.PI*2 - 0.6); // mild seasonality
    const projected = monthlyAvg*seasonal;
    cum += projected;
    months.push({ m, projected:Math.round(projected), cumulative:Math.round(cum),
      ceiling:Math.round(monthlyCeiling*m) });
  }
  const alertMonth = months.find(x=>x.cumulative > monthlyCeiling*x.m*0.70);
  return { months, annualCeiling, alertMonth: alertMonth? alertMonth.m : null };
}

function statusToText(t,s){ return s==="ok"?t("st_ok"):s==="pending"?t("st_pending"):t("st_delayed"); }
const n0 = v => Math.round(v).toLocaleString("en-US");
const pct1 = v => (v*100).toFixed(1)+"%";
function abbr(v){ const a=Math.abs(v);
  if(a>=1e9) return (v/1e9).toFixed(2)+"B";
  if(a>=1e6) return (v/1e6).toFixed(0)+"M";
  if(a>=1e3) return (v/1e3).toFixed(0)+"K";
  return n0(v); }
function useMoney(){ const {currency}=useStore(); const pre = currency==="symbol" ? "⃁ " : "SAR ";
  return { money:(v)=>pre+abbr(v), moneyFull:(v)=>pre+n0(v) }; }

/* ---- Data readiness (UC-02) ---- */
function DataReadiness(){
  const {t}=useStore();
  const [sources,setSources]=useState(DATA_SOURCES);
  const [running,setRunning]=useState(false); const [prog,setProg]=useState(100); const [done,setDone]=useState(true);
  const [flash,setFlash]=useState(false); const [ranOnce,setRanOnce]=useState(false);
  function run(){
    setRunning(true); setDone(false); setProg(0); setFlash(false);
    let p=0; const id=setInterval(()=>{ p+=10; setProg(p);
      if(p>=100){ clearInterval(id); setRunning(false); setDone(true); setRanOnce(true);
        setSources(prev=>prev.map(s=>({
          ...s,
          records: s.records + Math.max(1, Math.round(s.records*(0.001+Math.random()*0.004))),
          quality: Math.min(99, s.quality + 1 + Math.floor(Math.random()*2)),
          completeness: Math.min(99, s.completeness + 1 + Math.floor(Math.random()*2)),

/* ---- What-if (UC-09) — centerpiece ---- */
function WhatIf(){
  const {t,setRoute,addPackage,user}=useStore(); const {money}=useMoney();
  const [p,setP]=useState({reallocatePct:0,capHighPct:0,boostLowPct:0,offPlanPct:0});
  const [nl,setNl]=useState("");
  const [chain,setChain]=useState(["idle","idle","idle","idle"]);
  const [busy,setBusy]=useState(false);
  const [flash,setFlash]=useState(false);
  const scn=useMemo(()=>computeAllocation(p),[p]);
  const sv=scenarioSavings(scn);
  const C=RC;
  function animateChain(then){
    setBusy(true); const seq=["idle","idle","idle","idle"];
    [0,1,2,3].forEach((i)=>{
      setTimeout(()=>{ setChain(c=>{const n=[...c];n[i]="run";return n;}); },i*450);
      setTimeout(()=>{ setChain(c=>{const n=[...c];n[i]="done";return n;}); if(i===3){setBusy(false); then&&then(); setFlash(true); setTimeout(()=>setFlash(false),1100);} },i*450+380);
    });
  }
  function runSim(){ animateChain(); }
  function runNL(){
    // light NL parse: first number → boost <10k; mention of cap/reduce → cap; else recommended preset
    const m=nl.match(/(\d+)\s*%?/); const num=m?clamp(parseInt(m[1])/100,0,0.45):0.10;
    const next={...RECO_PARAMS, boostLowPct:num};
    if(/cap|reduce|تقييد|خفض/i.test(nl)) next.capHighPct=0.20;
    animateChain(()=>setP(next));
  }
  function assemble(){
    const affectsCap = p.capHighPct>0 || p.reallocatePct>0.20;
    addPackage({
      title: t("scenario")+" · "+new Date().toLocaleDateString(),
      params:{...p}, affectsCap,
      kpis:{ savingsPhase:sv.phase, pctBudget:sv.pctOfBudget, fg:scn.FG, hbr:scn.HBR },
    });
    setRoute("packages");
  }
  const cmp=[
    {k:t("kpi_savings"),b:"0",a:money(sv.phase),tone:"good"},
    {k:t("kpi_fairness"),b:BASELINE.FG.toFixed(2),a:scn.FG.toFixed(2),tone:scn.FG>=1?"good":"warn"},
    {k:t("kpi_hbr"),b:pct1(BASELINE.HBR),a:pct1(scn.HBR),tone:"good"},
  ];
  const Slider=({lk,field,max})=>(<div className="field">
    <label style={{display:"flex",justifyContent:"space-between"}}><span>{t(lk)}</span><span className="mono">{Math.round(p[field]*100)}%</span></label>
    <input className="range" type="range" min="0" max={max} step="1" value={Math.round(p[field]*100)}
      onChange={e=>setP({...p,[field]:parseInt(e.target.value)/100})}/></div>);
  return (<div className="fade">
    <PageHeader title={t("nav_whatif")} sub={t("whatif_sub")}/>
    <Section title={t("orchestration")}>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input className="input" placeholder={t("nlPlaceholder")} value={nl} onChange={e=>setNl(e.target.value)}/>
        <button className="btn" onClick={runNL} disabled={busy}>✦ {t("run")}</button>
      </div>
      {busy&&<div className="ai-scan"><span/></div>}
      {busy&&<div className="ai-working">✦ {t("aiWorking")}</div>}
      <OrchestrationChain states={chain}/>
    </Section>
    <div className="cols-2">
      <Section title={t("levers")} right={<button className="btn secondary sm" onClick={runSim} disabled={busy}>{busy?t("running"):t("runWhatif")}</button>}>
        <Slider lk="lv_realloc" field="reallocatePct" max="30"/>
        <Slider lk="lv_cap" field="capHighPct" max="35"/>
        <Slider lk="lv_boost" field="boostLowPct" max="45"/>
        <Slider lk="lv_offplan" field="offPlanPct" max="20"/>
      </Section>
      <div>
        <div className={"cols-3"+(flash?" flash-kpis":"")} style={{marginBottom:16}}>
          <KPI label={t("kpi_savings")} value={money(sv.phase)} sub={(sv.pctOfBudget*100).toFixed(0)+"% "+t("of_budget")} tone="good"/>
          <KPI label={t("kpi_fairness")} value={scn.FG.toFixed(2)} sub={t("fair_if")} tone={scn.FG>=1?"good":"warn"}/>
          <KPI label={t("kpi_hbr")} value={pct1(scn.HBR)} sub={t("toTarget")} tone="good"/>
        </div>
        <Section title={t("compare")}>
          <table className="tbl"><thead><tr><th></th><th className="right-num">{t("before")}</th><th className="right-num">{t("after")}</th></tr></thead>
            <tbody>{cmp.map((r,i)=>(<tr key={i}><td>{r.k}</td><td className="right-num mono muted">{r.b}</td>
              <td className="right-num mono" style={{fontWeight:700,color:r.tone==="good"?"var(--green)":"var(--amber)"}}>{r.a}</td></tr>))}</tbody></table>
        </Section>
      </div>
    </div>
    {user==="analyst"&&<button className="btn" style={{marginTop:4}} onClick={assemble}>🗎 {t("assembleFromHere")}</button>}
  </div>);
}

function leverSummary(t,p){
  const o=[];
  if(p.reallocatePct) o.push([t("lv_realloc"), Math.round(p.reallocatePct*100)+"%"]);
  if(p.capHighPct)    o.push([t("lv_cap"),     Math.round(p.capHighPct*100)+"%"]);
  if(p.boostLowPct)   o.push([t("lv_boost"),   Math.round(p.boostLowPct*100)+"%"]);
  if(p.offPlanPct)    o.push([t("lv_offplan"), Math.round(p.offPlanPct*100)+"%"]);
  return o;
}

          <td className="muted" style={{whiteSpace:"nowrap"}}>{a.ts}</td>
          <td className="muted">{a.note||"—"}</td>
        </tr>))}</tbody>
      </table></div>}
      {audit.length>0&&<div className="muted" style={{fontSize:12,marginTop:10}}>{t("openHint")}</div>}
    </div>
    {pkg && <Modal title={t("auditDetail")} onClose={()=>setSel(null)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:10}}>
        <span className="wo">#{pkg.id}</span>{statusChip(t,pkg.status)}
      </div>
      <h4 style={{margin:"0 0 14px",fontSize:16}}>{pkg.title}</h4>
      <div className="muted" style={{fontSize:12,marginBottom:6}}>{t("leversUsed")}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
        {levers.length? levers.map((l,i)=><span key={i} className="chip gray">{l[0]} <b style={{marginInlineStart:4}}>{l[1]}</b></span>)
          : <span className="muted" style={{fontSize:12}}>{t("noLevers")}</span>}
      </div>
      <div className="cols-3" style={{marginBottom:16}}>
        <div className="mini-kpi"><div className="muted">{t("kpi_savings")}</div><div className="v" style={{color:"var(--green)"}}>{money(pkg.kpis.savingsPhase)}</div></div>
        <div className="mini-kpi"><div className="muted">{t("kpi_fairness")}</div><div className="v">{pkg.kpis.fg.toFixed(2)}</div></div>
        <div className="mini-kpi"><div className="muted">{t("kpi_hbr")}</div><div className="v">{pct1(pkg.kpis.hbr)}</div></div>
      </div>
      <div className="divider"/>
      <div className="muted" style={{fontSize:12,marginBottom:10}}>{t("nav_audit")}</div>
      <div className="timeline">
        {pkg.history.map((h,i)=>(<div key={i} className="ev"><div style={{fontSize:12.5}}>
          <span className="tag">{t(h.role)}</span> <b>{t(h.action)}</b> {h.note?("· "+h.note):""}</div>
          <div className="muted" style={{fontSize:11}}>{h.ts}</div></div>))}
      </div>
    </Modal>}
  </div>);
}

/* ---- Copilot handoff (UC-10) ---- */
function CopilotHandoff(){
  const {t,audit}=useStore();
  const [sent,setSent]=useState(false);
  function deliver(){ setSent(true); setTimeout(()=>{ window.open("http://momah.test.hyrhui.com","_blank"); },700); }
  return (<div className="fade">
    <PageHeader title={t("nav_copilot")} sub={t("copilot_sub")}/>
    <Section title="API Contract → Housing Copilot">
      <div className="muted" style={{marginBottom:12}}>{t("deliveredItems")} · response &lt; 30s</div>
      <button className="btn" onClick={deliver}>{sent?("… "+t("opening")):("🤝 "+t("deliver"))}</button>

}

/* ---- action labels (merged into i18n) ---- */
Object.assign(I18N.en,{ act_submit:"Submitted", act_approve:"Approved (tactical)", act_escalate:"Escalated to Minister", act_adjudicate:"Adjudicated", act_reject:"Rejected" });
Object.assign(I18N.ar,{ act_submit:"تم الرفع", act_approve:"اعتُمد (تكتيكي)", act_escalate:"رُفع للوزير", act_adjudicate:"تم البتّ", act_reject:"رُفض" });

function nowStr(lang){ return new Date().toLocaleString(lang==="ar"?"ar-SA":"en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }

/* =========================================================================
   Seed mock data (work orders + audit trail) so every role page is populated.
   ========================================================================= */
const STATUS_OF = { act_submit:"submitted", act_approve:"approved", act_escalate:"escalated", act_adjudicate:"adjudicated", act_reject:"rejected" };
function makeKpis(params){ const s=computeAllocation(params); const sv=scenarioSavings(s);
  return { savingsPhase:sv.phase, pctBudget:sv.pctOfBudget, fg:s.FG, hbr:s.HBR }; }
const RAW_SEED = [
  { id:"WO-2026-0312", title:"Q2 reallocation · Riyadh & Makkah", params:{reallocatePct:0.10,boostLowPct:0.08,offPlanPct:0.05}, affectsCap:false, status:"submitted",
    history:[{role:"analyst",action:"act_submit",ts:"03 Jun 09:12",note:""}] },
  { id:"WO-2026-0309", title:"Off-plan restriction · national", params:{offPlanPct:0.12,capHighPct:0.10}, affectsCap:true, status:"submitted",
    history:[{role:"analyst",action:"act_submit",ts:"02 Jun 14:40",note:""}] },
  { id:"WO-2026-0305", title:"Monthly support rebalancing", params:{reallocatePct:0.12,boostLowPct:0.10,offPlanPct:0.06}, affectsCap:false, status:"approved",
    history:[{role:"analyst",action:"act_submit",ts:"28 May 10:05",note:""},{role:"owner",action:"act_approve",ts:"29 May 11:20",note:"Within tactical authority"}] },
  { id:"WO-2026-0299", title:"Support cap revision · >16k band", params:{capHighPct:0.22,reallocatePct:0.18}, affectsCap:true, status:"escalated",
    history:[{role:"analyst",action:"act_submit",ts:"24 May 08:30",note:""},{role:"owner",action:"act_escalate",ts:"25 May 09:00",note:"Affects support cap"}] },
  { id:"WO-2026-0288", title:"Phase-3 fairness uplift", params:{reallocatePct:0.25,capHighPct:0.20,boostLowPct:0.15,offPlanPct:0.10}, affectsCap:true, status:"adjudicated",
    history:[{role:"analyst",action:"act_submit",ts:"18 May 09:00",note:""},{role:"owner",action:"act_escalate",ts:"19 May 10:00",note:""},{role:"minister",action:"act_adjudicate",ts:"21 May 12:30",note:"Approved with monitoring"}] },
  { id:"WO-2026-0276", title:"Aggressive cap scenario", params:{capHighPct:0.35,offPlanPct:0.20}, affectsCap:true, status:"rejected",
    history:[{role:"analyst",action:"act_submit",ts:"12 May 08:15",note:""},{role:"owner",action:"act_reject",ts:"13 May 09:40",note:"Too aggressive on >13k bands"}] },
];
function seedPackages(){ return RAW_SEED.map(p=>({ ...p, params:{...p.params}, history:p.history.map(h=>({...h})), kpis:makeKpis(p.params) })); }
function seedAudit(){ const out=[]; RAW_SEED.forEach(p=>p.history.forEach(h=>out.push({ role:h.role, action:h.action, target:p.id, status:STATUS_OF[h.action], ts:h.ts, note:h.note }))); return out.reverse(); }

function App(){
  const [user,setUserState]=useState(null);
  const [lang,setLang]=useState("en");
  const [currency,setCurrency]=useState("SAR");
  const [route,setRoute]=useState("home");
  const [packages,setPackages]=useState(seedPackages);
  const [audit,setAudit]=useState(seedAudit);
  const t=(k)=> (I18N[lang] && I18N[lang][k]!==undefined) ? I18N[lang][k] : k;

  useEffect(()=>{ const html=document.documentElement; html.lang=lang; html.dir=lang==="ar"?"rtl":"ltr"; },[lang]);

  function setUser(r){ setUserState(r); setRoute(r==="minister"?"cockpit":"home"); }
  function pushAudit(ev){ setAudit(prev=>[{...ev,ts:nowStr(lang)},...prev]); }
  function addPackage(data){
    const ts=nowStr(lang);
    const id="WO-2026-0"+(400+packages.length);
    const pkg={ id, status:"submitted",
      history:[{role:"analyst",action:"act_submit",ts,note:""}], ...data };
    setPackages(prev=>[pkg,...prev]);
    pushAudit({role:"analyst",action:"act_submit",target:id,status:"submitted"});
  }
  function actOnPackage(id,kind,note){
    const map={ approve:["approved","act_approve","owner"], escalate:["escalated","act_escalate","owner"],
      reject:["rejected","act_reject",user], adjudicate:["adjudicated","act_adjudicate","minister"] };
    const [status,action,role]=map[kind]; const ts=nowStr(lang);
    setPackages(prev=>prev.map(p=>p.id===id?{...p,status,history:[...p.history,{role,action,ts,note:note||""}]}:p));
    pushAudit({role,action,target:id,status,note:note||""});
  }
  function reset(){ setPackages(seedPackages()); setAudit(seedAudit()); setRoute(user==="minister"?"cockpit":"home"); }

  const store={ t,lang,setLang,currency,setCurrency,user,setUser,route,setRoute,packages,audit,addPackage,actOnPackage,reset };

  if(!user) return (<Ctx.Provider value={store}><Login/></Ctx.Provider>);

  let page=null;
  if(user==="analyst"){
    page = route==="data"?<DataReadiness/> : route==="alloc"?<Allocation/> : route==="forecast"?<ForecastFairness/>
      : route==="whatif"?<WhatIf/> : route==="packages"?<DecisionPackages/> : route==="audit"?<AuditTrailPage/>
      : route==="copilot"?<CopilotHandoff/> : <AnalystHome/>;
  } else if(user==="owner"){
    page = route==="approvals"?<DecisionPackages filter={p=>p.status!=="draft"}/> : route==="forecast"?<ForecastFairness/>
      : route==="audit"?<AuditTrailPage/> : <OwnerHome/>;
  } else {
    page = route==="decisions"?<DecisionPackages filter={p=>["escalated","adjudicated","rejected"].includes(p.status)}/>
      : route==="audit"?<AuditTrailPage/> : <MinisterHome/>;
  }
  return (<Ctx.Provider value={store}>
    <TopBar/>
    <div className="shell"><Sidebar/><div className="content">{page}</div></div>
  </Ctx.Provider>);
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
